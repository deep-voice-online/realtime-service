<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Whisper Realtime Test</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
      body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eceff1; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
      .card { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
      h2 { margin-top: 0; color: #2c3e50; font-size: 1.2rem; }
      #status { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; margin-bottom: 20px; }
      .online { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
      .offline { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
      #output { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; padding: 15px; min-height: 150px; max-height: 300px; overflow-y: auto; white-space: pre-wrap; color: #34495e; line-height: 1.5; }
      .user-info { font-size: 0.8rem; color: #7f8c8d; margin-bottom: 10px; }
  </style>
</head>
<body>

<div class="card">
  <h2>Whisper Transcription</h2>
  <div class="user-info">ID: cba06510-4b1c-46f2-af72-f1c9194e557b</div>
  <div id="status" class="offline">Подключение...</div>

  <div id="output">Ожидание готовой транскрибации...</div>
</div>

<script>
  const userId = 'cba06510-4b1c-46f2-af72-f1c9194e557b';
  const serverUrl = 'http://localhost:4000'; // Твой порт

  // Подключаемся и передаем userId в query
  const socket = io(serverUrl, {
    query: { userId: userId },
    transports: ['websocket']
  });

  const statusEl = document.getElementById('status');
  const outputEl = document.getElementById('output');

  // Слушаем событие подключения
  socket.on('connect', () => {
    statusEl.innerText = '● В сети (Соединение установлено)';
    statusEl.className = 'online';
    console.log('Connected with socket ID:', socket.id);
  });

  // Слушаем событие отключения
  socket.on('disconnect', () => {
    statusEl.innerText = '○ Оффлайн (Связь разорвана)';
    statusEl.className = 'offline';
  });

  // Слушаем то самое событие из твоего SocketController
  socket.on('transcription_ready', (data) => {
    console.log('Данные получены:', data);

    // Если это первая транскрибация, очищаем заглушку
    if (outputEl.innerText.includes('Ожидание')) {
      outputEl.innerText = '';
    }

    // Добавляем новый текст
    const time = new Date(data.receivedAt || Date.now()).toLocaleTimeString();
    outputEl.innerHTML += `<p><strong>[${time}]:</strong> ${data.text}</p>`;

    // Скроллим вниз
    outputEl.scrollTop = outputEl.scrollHeight;
  });

  // Обработка ошибок
  socket.on('connect_error', (err) => {
    console.error('Ошибка подключения:', err.message);
    statusEl.innerText = 'Ошибка: ' + err.message;
    statusEl.className = 'offline';
  });
</script>

</body>
</html>
